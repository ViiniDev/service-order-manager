spring.application.name=service-order-manager-api
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:h2:mem:service_orders
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=${JWT_SECRET:service-order-manager-dev-secret-change-me}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:480}
